<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Atelier de Potions Grammaticales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <!-- Background image -->
    <div id="scene-background"></div>

    <!-- 2D Cauldron image -->
    <img id="cauldron-2d" src="assets/cauldron.png" alt="Chaudron" />

    <!-- Three.js canvas (transparent — only effects + pouring animation) -->
    <canvas id="scene"></canvas>

    <!-- 2D Wizard -->
    <div id="wizard-2d">
      <div class="wiz-hat">
        <div class="wiz-hat-cone"></div>
        <div class="wiz-hat-brim"></div>
        <div class="wiz-hat-band"></div>
        <div class="wiz-hat-star star1">&#10022;</div>
        <div class="wiz-hat-star star2">&#10022;</div>
      </div>
      <div class="wiz-head">
        <div class="wiz-eye wiz-eye-l">
          <div class="wiz-iris"><div class="wiz-pupil"></div></div>
          <div class="wiz-eye-shine"></div>
        </div>
        <div class="wiz-eye wiz-eye-r">
          <div class="wiz-iris"><div class="wiz-pupil"></div></div>
          <div class="wiz-eye-shine"></div>
        </div>
        <div class="wiz-brow wiz-brow-l"></div>
        <div class="wiz-brow wiz-brow-r"></div>
        <div class="wiz-cheek wiz-cheek-l"></div>
        <div class="wiz-cheek wiz-cheek-r"></div>
        <div class="wiz-nose"></div>
        <div class="wiz-mouth"></div>
      </div>
      <div class="wiz-beard">
        <div class="wiz-beard-main"></div>
        <div class="wiz-beard-tip"></div>
        <div class="wiz-mustache-l"></div>
        <div class="wiz-mustache-r"></div>
      </div>
      <div class="wiz-body">
        <div class="wiz-robe"></div>
        <div class="wiz-belt"><div class="wiz-buckle"></div></div>
        <div class="wiz-arm wiz-arm-l">
          <div class="wiz-hand"></div>
        </div>
        <div class="wiz-arm wiz-arm-r">
          <div class="wiz-hand"></div>
        </div>
      </div>
      <div class="wiz-boots">
        <div class="wiz-boot-l"></div>
        <div class="wiz-boot-r"></div>
      </div>
    </div>

    <!-- 2D Cat -->
    <div id="cat-2d">
      <div class="cat-tail">
        <div class="cat-tail-seg seg1"></div>
        <div class="cat-tail-seg seg2"></div>
        <div class="cat-tail-seg seg3"></div>
        <div class="cat-tail-tip"></div>
      </div>
      <div class="cat-body">
        <div class="cat-belly"></div>
      </div>
      <div class="cat-head">
        <div class="cat-ear cat-ear-l"><div class="cat-ear-inner"></div></div>
        <div class="cat-ear cat-ear-r"><div class="cat-ear-inner"></div></div>
        <div class="cat-eye cat-eye-l">
          <div class="cat-iris"><div class="cat-slit"></div></div>
          <div class="cat-eye-shine"></div>
        </div>
        <div class="cat-eye cat-eye-r">
          <div class="cat-iris"><div class="cat-slit"></div></div>
          <div class="cat-eye-shine"></div>
        </div>
        <div class="cat-nose"></div>
        <div class="cat-whisker cat-whisker-l1"></div>
        <div class="cat-whisker cat-whisker-l2"></div>
        <div class="cat-whisker cat-whisker-l3"></div>
        <div class="cat-whisker cat-whisker-r1"></div>
        <div class="cat-whisker cat-whisker-r2"></div>
        <div class="cat-whisker cat-whisker-r3"></div>
      </div>
      <div class="cat-collar">
        <div class="cat-bell"></div>
      </div>
      <div class="cat-paws">
        <div class="cat-paw cat-paw-l"></div>
        <div class="cat-paw cat-paw-r"></div>
      </div>
    </div>

    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
      <div class="title-content">
        <h1 class="title">L'Atelier de Potions</h1>
        <p class="subtitle">Potions Grammaticales</p>
        <div id="total-score" class="total-score">🧪 <span id="total-score-count">0</span> potions réussies</div>
        <div class="level-select">
          <button class="btn-level" data-level="apprenti">
            <span class="level-icon">🧪</span>
            <span class="level-name">Apprenti</span>
            <span class="level-desc">Accords adjectif-nom</span>
          </button>
          <button class="btn-level" data-level="alchimiste">
            <span class="level-icon">⚗️</span>
            <span class="level-name">Alchimiste</span>
            <span class="level-desc">Accords sujet-verbe</span>
          </button>
          <button class="btn-level" data-level="maitre">
            <span class="level-icon">🔮</span>
            <span class="level-name">Maître</span>
            <span class="level-desc">Un peu de tout !</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="game-overlay">
        <!-- Top bar: score + back button -->
        <div class="game-top-bar">
          <div id="game-score" class="game-score">🧪 <span id="game-score-count">0</span></div>
          <button id="btn-back" class="btn-back" title="Menu principal">✕</button>
        </div>

        <!-- Progress bar -->
        <div id="progress-bar" class="progress-bar">
          <!-- Filled dynamically -->
        </div>

        <!-- Hint -->
        <div id="hint" class="hint"></div>

        <!-- Sentence builder -->
        <div id="sentence-builder" class="sentence-builder">
          <!-- Slots filled dynamically -->
        </div>

        <!-- Word cards -->
        <div id="word-cards" class="word-cards">
          <!-- Cards filled dynamically -->
        </div>

        <!-- Validate button -->
        <button id="btn-validate" class="btn-validate" disabled>
          Lancer la potion !
        </button>

        <!-- Feedback message -->
        <div id="feedback" class="feedback hidden"></div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results-content">
        <h2 class="results-title">Bravo, jeune alchimiste !</h2>
        <div id="results-stars" class="results-stars"></div>
        <p id="results-score" class="results-score"></p>
        <p id="results-message" class="results-message"></p>
        <button id="btn-replay" class="btn-replay">Rejouer</button>
        <button id="btn-menu" class="btn-menu">Menu principal</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
