<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json?v=20260318b" />
    <link rel="apple-touch-icon" href="assets/55A5440E-0562-4249-8ED9-C8838EF7DF76_4_5005_c.png" />
    <title>L'Atelier de Potions Grammaticales</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=20260318b" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <!-- Background image -->
    <div id="scene-background"></div>

    <!-- 2D Cauldron image -->
    <img id="cauldron-2d" src="assets/cauldron.png?v=20260318b" alt="Chaudron" />
    <div id="cauldron-aura" aria-hidden="true"></div>

    <!-- Three.js canvas (transparent — only effects + pouring animation) -->
    <canvas id="scene"></canvas>

    <!-- 2D Wizard -->
    <img id="wizard-2d" src="assets/wizard.png" alt="Sorcier" />

    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
      <div class="title-content">
        <h1 class="title">L'Atelier de Potions</h1>
        <p class="subtitle">Potions Grammaticales</p>
        <div class="level-select">
          <button class="btn-level" data-level="apprenti">
            <span class="level-icon">🧪</span>
            <span class="level-name">Apprenti</span>
            <span class="level-desc">Accords adjectif-nom</span>
          </button>
          <button class="btn-level" data-level="alchimiste">
            <span class="level-icon">⚗️</span>
            <span class="level-name">Alchimiste</span>
            <span class="level-desc">Accords sujet-verbe</span>
          </button>
          <button class="btn-level" data-level="maitre">
            <span class="level-icon">🔮</span>
            <span class="level-name">Maître</span>
            <span class="level-desc">Un peu de tout !</span>
          </button>
          <button class="btn-level" data-level="archimage">
            <span class="level-icon">👑</span>
            <span class="level-name">Archimage</span>
            <span class="level-desc">Construis toute la phrase !</span>
          </button>
        </div>
        <div class="mode-panel">
          <h2 class="mode-title">Choisis un mode de jeu</h2>
          <div class="mode-select">
            <button class="btn-mode active" data-mode="classic">
              <span class="mode-name">Classique</span>
              <span class="mode-desc">Le mode actuel, tranquille</span>
            </button>
            <button class="btn-mode" data-mode="combo">
              <span class="mode-name">Combo</span>
              <span class="mode-desc">Les bonnes series rapportent plus</span>
            </button>
            <button class="btn-mode" data-mode="chrono">
              <span class="mode-name">Chrono</span>
              <span class="mode-desc">40 secondes pour marquer un max</span>
            </button>
            <button class="btn-mode" data-mode="survival">
              <span class="mode-name">Survie</span>
              <span class="mode-desc">10 potions avec 2 erreurs max</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
      <div class="game-overlay">
        <!-- Top bar: score + back button -->
        <div class="game-top-bar">
          <div id="game-score" class="game-score"><span id="game-score-label">Potions réussies</span> <span id="game-score-count">0</span></div>
          <div id="game-mode-status" class="game-mode-status hidden"></div>
          <button id="btn-back" class="btn-back" title="Menu principal">✕</button>
        </div>

        <!-- Progress bar -->
        <div id="progress-bar" class="progress-bar">
          <!-- Filled dynamically -->
        </div>

        <!-- Hint -->
        <div id="hint" class="hint"></div>

        <!-- Sentence builder -->
        <div id="sentence-builder" class="sentence-builder">
          <!-- Slots filled dynamically -->
        </div>

        <!-- Word cards -->
        <div id="word-cards" class="word-cards">
          <!-- Cards filled dynamically -->
        </div>

        <!-- Validate button -->
        <button id="btn-validate" class="btn-validate" disabled>
          Lancer la potion !
        </button>

        <!-- Feedback message -->
        <div id="feedback" class="feedback hidden"></div>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results-content">
        <h2 class="results-title">Bravo, jeune alchimiste !</h2>
        <div id="results-stars" class="results-stars"></div>
        <p id="results-score" class="results-score"></p>
        <p id="results-message" class="results-message"></p>
        <p id="results-mode-summary" class="results-mode-summary"></p>
        <button id="btn-replay" class="btn-replay">Rejouer</button>
        <button id="btn-menu" class="btn-menu">Menu principal</button>
      </div>
    </div>

    <!-- Rotate overlay (portrait mobile) -->
    <div id="rotate-overlay">
      <div class="rotate-content">
        <div class="rotate-icon">📱</div>
        <p>Tourne ton écran en paysage !</p>
      </div>
    </div>

    <div class="scroll-controls" aria-label="Navigation verticale">
      <button id="btn-scroll-up" class="scroll-btn" type="button" aria-label="Monter">▲</button>
      <button id="btn-scroll-down" class="scroll-btn" type="button" aria-label="Descendre">▼</button>
    </div>

    <script src="script.js?v=20260318b"></script>
  </body>
</html>
